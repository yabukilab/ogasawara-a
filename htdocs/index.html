<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- レスポンシブ対応 -->
  <title><ruby>幼稚園<rt>ようちえん</rt></ruby>・<ruby>保育園児<rt>ほいくえんじ</rt></ruby>に<ruby>おすすめ<rt>お</rt></ruby>の<ruby>場所<rt>ばしょ</rt></ruby></title>
  <link rel="stylesheet" type="text/css" href="index.css">
  <style>
    .slideshow-container {
      position: relative;
      max-width: 100%;
      margin: auto;
      overflow: hidden;
      text-align: center; /* 中央揃え */
    }

    .slides {
      display: none;
      width: 50%; /* 横幅の2分の1 */
      height: auto;
      margin: auto; /* 中央揃え */
    }

    .head {
      text-align: center; /* 中央揃え */
    }

    .head h1 {
      margin: 0; /* マージンをリセット */
      line-height: 1.2; /* 行間を調整 */
    }

    .sub-title {
      color: white; /* 文字色を白に */
      font-size: 12px; /* タイトルの5分の1のサイズ */
      position: absolute; /* 絶対位置を設定 */
      right: 20px; /* 右側に配置 */
      bottom: 10px; /* 下部に配置 */
    }

    section {
      padding: 15px; /* セクションの内側に少し余白を追加 */
      border: 2px solid #4CAF50; /* 緑の外枠を追加 */
      border-radius: 15px; /* 角を丸くする */
      background-color: white; /* 背景色を白に設定 */
      margin: 15px 0; /* セクション間のマージンを追加 */
    }
  </style>
</head>

<body>
  <!-- ヘッダーセクション -->
  <div class="head" style="position: relative;">
    <h1><ruby>幼稚園<rt>ようちえん</rt></ruby>・<ruby>保育園児<rt>ほいくえんじ</rt></ruby><br><ruby>おすすめ<rt>お</rt></ruby>の<ruby>場所<rt>ばしょ</rt></ruby></h1> <!-- タイトル -->
    <div class="sub-title">※<ruby>PM<rt>ぴーえむ</rt></ruby><ruby>実験<rt>じっけん</rt></ruby><ruby>用<rt>よう</rt></ruby>の<ruby>サイト<rt>さいと</rt></ruby>です。</div> <!-- サブタイトル -->
  </div>

  <!-- スライドショーセクション -->
  <div class="slideshow-container">
    <img class="slides" src="auto.images/1丁目.jpg" alt="スライド1" /> <!-- スライド画像1 -->
    <img class="slides" src="auto.images/谷津.jpg" alt="スライド2" /> <!-- スライド画像2 -->
    <img class="slides" src="auto.images/モーリーファンタジー４.jpg" alt="スライド3" /> <!-- スライド画像3 -->
  </div>

  <!-- メインコンテンツセクション -->
  <div class="main">
    <div class="btn-all">
      <!-- 各公園情報セクション -->
      <section class="park-info">
        <h3><ruby>谷津奏<rt>やつかなで</rt></ruby>の<ruby>杜<rt>もり</rt></ruby><ruby>公園<rt>こうえん</rt></ruby></h3> <!-- 公園名 -->
        <p><ruby>広<rt>ひろ</rt></ruby>さが<ruby>魅力<rt>みりょく</rt></ruby>！</p> <!-- 公園の特徴 -->
        <a href="im.html" class="btn btn-solid"><span><ruby>詳<rt>くわ</rt></ruby>しく<ruby>見る<rt>み</rt></ruby></span></a> <!-- ボタン -->
      </section>
      <section class="park-info">
        <h3><ruby>津田沼<rt>つだぬま</rt></ruby>1<ruby>丁目<rt>ちょうめ</rt></ruby><ruby>公園<rt>こうえん</rt></ruby></h3> <!-- 公園名 -->
        <p><ruby>公園<rt>こうえん</rt></ruby>に<ruby>SL機関車<rt>えすえるきかんしゃ</rt></ruby>！？</p> <!-- 公園の特徴 -->
        <a href="ir.html" class="btn btn-solid"><span><ruby>詳<rt>くわ</rt></ruby>しく<ruby>見る<rt>み</rt></ruby></span></a> <!-- ボタン -->
      </section>
      <section class="park-info">
        <h3><ruby>モーリーファンタジー</ruby></h3> <!-- 公園名 -->
        <p><ruby>ボールプール</ruby>で<ruby>遊<rt>あそ</rt></ruby>べる<ruby>安心<rt>あんしん</rt></ruby><ruby>安全<rt>あんぜん</rt></ruby></p> <!-- 公園の特徴 -->
        <a href="yh.html" class="btn btn-solid"><span><ruby>詳<rt>くわ</rt></ruby>しく<ruby>見る<rt>み</rt></ruby></span></a> <!-- ボタン -->
      </section>
    </div>
  </div>

  <!-- フッターセクション -->
  <div class="footer">
    <span class="letter">2024 <ruby>OGASAWARA-A<rt>おがさわらえー</rt></ruby></span> <!-- フッターの著作権表示 -->
  </div>

  <!-- スライドショーのJavaScript -->
  <script>
    let slideIndex = 0;
    showSlides();

    function showSlides() {
      const slides = document.getElementsByClassName("slides");
      for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none"; // 全てのスライドを非表示
      }
      slideIndex++; // スライドインデックスを増加
      if (slideIndex > slides.length) {
        slideIndex = 1; // 最後のスライドの次は最初のスライド
      }
      slides[slideIndex - 1].style.display = "block"; // 現在のスライドを表示
      setTimeout(showSlides, 3000); // 3秒ごとに切り替え
    }
  </script>

</body>

</html>
