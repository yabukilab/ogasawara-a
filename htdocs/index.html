<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- レスポンシブ対応 -->
  <title>幼稚園・保育園児におすすめの場所</title>
  <link rel="stylesheet" type="text/css" href="index.css">
  <style>
    .slideshow-container {
      position: relative;
      max-width: 100%;
      margin: auto;
      overflow: hidden;
      text-align: center; /* 中央揃え */
    }

    .slides {
      display: none;
      width: 50%; /* 横幅の2分の1 */
      height: auto;
      margin: auto; /* 中央揃え */
    }

    .head {
      text-align: center; /* 中央揃え */
    }

    .head h1 {
      margin: 0; /* マージンをリセット */
      line-height: 1.2; /* 行間を調整 */
    }
  </style>
</head>

<body>
  <div class="head">
    <h1>幼稚園・保育園児<br>おすすめの場所</h1>
  </div>

  <div class="slideshow-container">
    <img class="slides" src="auto.images/1丁目.jpg" alt="スライド1" />
    <img class="slides" src="auto.images/ウサギ.jpg" alt="スライド2" />
    <img class="slides" src="auto.images/キャロット.jpg" alt="スライド3" />
    <img class="slides" src="auto.images/谷津.jpg" alt="スライド4" />
  </div>

  <div class="main">
    <div class="btn-all">
      <div class="park-info">
        <h3>谷津奏の杜公園</h3>
        <p></p>
        <a href="im.html" class="btn btn-solid"><span>PUSH1</span></a>
      </div>
      <div class="park-info">
        <h3>津田沼1丁目公園</h3>
        <p>広さが魅力！</p>
        <a href="ir.html" class="btn btn-solid"><span>PUSH2</span></a>
      </div>
      <div class="park-info">
        <h3>公園3の名前</h3>
        <p>美しい花々に囲まれた公園で、ピクニックにも最適です。</p>
        <a href="yh.html" class="btn btn-solid"><span>PUSH3</span></a>
      </div>
    </div>
  </div>


  <div class="footer">
    <span class="letter">© 小笠原研究室 A</span>
  </div>

  <script>
    let slideIndex = 0;
    showSlides();

    function showSlides() {
      const slides = document.getElementsByClassName("slides");
      for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      slideIndex++;
      if (slideIndex > slides.length) {
        slideIndex = 1;
      }
      slides[slideIndex - 1].style.display = "block";
      setTimeout(showSlides, 3000); // 3秒ごとに切り替え
    }
  </script>

</body>

</html>
