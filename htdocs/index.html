<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- レスポンシブ対応 -->
  <title>幼稚園・保育園児におすすめの場所</title> <!-- タイトルを適切に設定 -->
  <link rel="stylesheet" type="text/css" href="index.css">
  <style>
    .slideshow-container {
      position: relative;
      max-width: 100%;
      margin: auto;
      overflow: hidden;
    }

    .slides {
      display: none;
      width: 100%;
      height: auto;
    }

    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      width: auto;
      padding: 16px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      transition: 0.6s ease;
      border-radius: 0 3px 3px 0;
      user-select: none;
    }

    .next {
      right: 0;
      border-radius: 3px 0 0 3px;
    }

    .prev:hover, .next:hover {
      background-color: rgba(0, 0, 0, 0.8);
    }
  </style>
</head>

<body>
  <div class="head">
    <h1>幼稚園・保育園児におすすめの場所</h1>
  </div>

  <div class="slideshow-container">
    <img class="slides" src="path/to/image1.jpg" alt="スライド1" />
    <img class="slides" src="path/to/image2.jpg" alt="スライド2" />
    <img class="slides" src="path/to/image3.jpg" alt="スライド3" />

    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
    <a class="next" onclick="plusSlides(1)">&#10095;</a>
  </div>

  <div class="main">
    <div class="btn-all">
      <div class="park-info">
        <h3>津田沼１丁目公園</h3>
        <p>本物の汽車！？</p>
        <a href="im.html" class="btn btn-solid"><span>PUSH1</span></a>
      </div>
      <div class="park-info">
        <h3>谷津奏の杜公園</h3>
        <p>広さが魅力！</p>
        <a href="ir.html" class="btn btn-solid"><span>PUSH2</span></a>
      </div>
      <div class="park-info">
        <h3>公園3の名前</h3>
        <p>美しい花々に囲まれた公園で、ピクニックにも最適です。</p>
        <a href="yh.html" class="btn btn-solid"><span>PUSH3</span></a>
      </div>
    </div>
  </div>

  <div class="info">
    地図とかなんとか
    <img src="path/to/your/image.png" alt="説明文" /> <!-- 正しいパスに置き換えてください -->
  </div>

  <div class="footer">
    <span class="letter">© 小笠原研究室 A</span>
  </div>

  <script>
    let slideIndex = 0;
    showSlides();

    function showSlides() {
      const slides = document.getElementsByClassName("slides");
      for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      slideIndex++;
      if (slideIndex > slides.length) {
        slideIndex = 1;
      }
      slides[slideIndex - 1].style.display = "block";
      setTimeout(showSlides, 3000); // 3秒ごとに切り替え
    }

    function plusSlides(n) {
      slideIndex += n - 1;
      if (slideIndex < 0) {
        slideIndex = 0;
      } else if (slideIndex >= document.getElementsByClassName("slides").length) {
        slideIndex = document.getElementsByClassName("slides").length - 1;
      }
      showSlides();
    }
  </script>

</body>

</html>
