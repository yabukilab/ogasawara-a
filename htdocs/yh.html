<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像表示例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0; /* デフォルトのマージンを削除 */
            padding: 0; /* デフォルトのパディングを削除 */
        }

        .head, .team, .main, .info, .footer {
            text-align: left;
            padding: 15px; /* スマホ用にパディングを調整 */
            width: 100%; /* 幅を100%に設定 */
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }

        .btn-all {
            margin: 5px 0; /* 縦のマージンのみ設定 */
            width: 100%; /* ボタンを幅いっぱいに */
        }

        a.btn-solid {
            color: #fff;
            border-top: 4px solid #48ecc4;
            border-right: 4px solid #0a5f4a;
            border-bottom: 4px solid #0f745b;
            border-left: 4px solid #8cf9de;
            border-radius: 0;
            background: #11a37f;
        }
        
        a.btn-solid:hover {
            color: #fff;
            border-top: 4px solid #0f745b;
            border-right: 4px solid #8cf9de;
            border-bottom: 4px solid #48ecc4;
            border-left: 4px solid #0a5f4a;
        }

        .btn {
            display: inline-block;
            padding: 15px; /* スマホ用にパディングを調整 */
            margin: 5px 0; /* 縦のマージンのみ設定 */
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            width: 100%; /* ボタンを幅いっぱいに */
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .footer {
            background-color: #f4f4f4;
            padding: 10px 0; /* フッターのパディング */
        }

        /* レスポンシブデザイン */
        @media (max-width: 768px) {
            .btn {
                padding: 15px; /* スマホ用にパディングを調整 */
            }
        }
    </style>
</head>
<body>
    <div class="head">
        <h1>画像表示例</h1>
        <img src="/images/screenshot.png" alt="スクリーンショット"> <!-- 画像のパスを修正 -->
    </div>
    <div class="footer">
        <p>フッター内容</p>
    </div>
</body>
</html>
