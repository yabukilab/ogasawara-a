<!DOCTYPE html>
<html lang="style.css">

<head>
  <title>ご飯の店紹介サイト</title>
  <style>
    /* 簡単なスタイリングをここに追加 */
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }
  
    img, iframe {
      max-width: 100%;
      height: auto;
    }
  
    .map-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 アスペクト比 */
      height: 0;
    }
  
    .map-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
  </head>
  <body>
  
  <h1>中華料理　楽楽屋　津田沼4号店</h1> <!-- 店名をここに入れます -->
  
  <!-- 店の写真 -->
  <img src="restaurant_photo.jpg" alt="おいしいご飯屋さんの写真">
  
  <!-- 店の説明 -->
  <h2>店の説明</h2>
  <p>ここの中華屋さんは本格中華でランチの時に行くと、安い値段で本格中華が食べられます<br>
     日替わりランチは3種類もあってメニューはとても豊富で毎日通っても飽きないぐらいです。<br>
    </p>
  
  <!-- 店の地図（Googleマップ） -->
  <h2>店の地図</h2>
  <div class="map-container">
  <iframe
    src="https://maps.app.goo.gl/cbweYoMUyPUvmqd97"
    allowfullscreen>
  </iframe>
  </div>
  
  <!-- アクセス情報 -->
  <h2>アクセス情報</h2>
  
  <h3>千葉工業大学からのアクセス</h3>
  <p>千葉工業大学から徒歩４分</p>
  
  <h3>津田沼駅からのアクセス</h3>
  <p>津田沼から徒歩５分</p>
  
  <!-- 実際の感想 -->
  <h2>実際の感想</h2>
  <p>ご飯の味としては美味しく文句はありません。（ラーメンはメンマと煮卵が冷たいので注意<br>
   注意として　現金しか対応してないことです。</p>
  
  </body>
  </html>
