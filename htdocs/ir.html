<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>津田沼1丁目公園 - TSUDANUMA ITTYOUME PARK</title>
    <!-- 外部CSSファイルのリンク。スタイルの定義はir.cssに記載されている -->
    <link rel="stylesheet" href="ir.css">
    <!-- SplideJSのスタイルシート。SplideJSはスライダー（画像カルーセル）用のライブラリ -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@latest/dist/css/splide.min.css">
    <style>
        /* ブラウザの余白を削除し、フォントや背景色を設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4; /* 背景色を薄いグレーに設定 */
        }

        /* ヘッダーのスタイル設定。背景色は緑、文字色は白 */
        header {
            background-color: #4CAF50;
            color: white;
            text-align: center; /* 中央揃え */
            padding: 10px;
        }

        /* フッターもヘッダーと同様に緑色の背景と白い文字 */
        footer {
            text-align: center;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
        }

        header nav ul li a {
            font-size: 1.5em; /* リンクのフォントサイズを大きく */
            margin: 0 15px; /* リンク間のマージンを追加 */
        }

        /* 画像スライダー（ヒーローセクション）のスタイル設定 */
        .hero {
            position: relative; /* 相対位置で配置 */
        }

        /* 画像カルーセル内の画像サイズを調整 */
        #image-carousel .splide__slide img {
            width: 80%; /* 画像の幅を80%に設定 */
            height: auto; /* 高さは自動調整 */
            display: block;
            margin: 0 auto; /* 画像を中央揃えに設定 */
        }

        /* セクション要素のスタイル */
        section {
            padding: 15px; /* 内側に15pxの余白を追加 */
            border: 2px solid #4CAF50; /* 緑色の枠線を追加 */
            border-radius: 15px; /* 枠線の角を丸くする */
            background-color: white; /* 背景色を白に設定 */
            margin: 15px 0; /* 上下に余白を追加 */
        }

        /* タイトル(h1)のスタイル */
        h1 {
            font-size: 2.5em; /* フォントサイズを大きく設定 */
            margin: 0; /* マージンをリセット */
        }

        /* 画面幅が768px以下（モバイル端末など）の場合に適用されるスタイル */
        @media (max-width: 768px) {
            /* ヘッダーとフッターのパディングを調整してモバイル表示に対応 */
            header, footer {
                padding: 10px 5px;
            }
            section {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ヘッダー部分。ナビゲーションメニューを含む -->
    <header>
        <nav>
            <ul>
                <!-- メニュー項目。リンク先は各ページへ移動 -->
                <li><a href="https://ogasawara-a.pm-chiba.tech/">HOME</a></li>
                <li><a href="https://ogasawara-a.pm-chiba.tech/im.html">遊び場1</a></li>
                <li><a href="https://ogasawara-a.pm-chiba.tech/yh.html">遊び場3</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- ヒーローセクション。公園のメインタイトルと画像スライダーを含む -->
        <section class="hero">
            <h1>津田沼1丁目公園</h1>
            <p>津田沼駅のすぐそば！SL機関車もみれる開放的な公園！！</p>
            <!-- 画像カルーセルのセクション。SplideJSを使用 -->
            <section id="image-carousel" class="splide" aria-label="津田沼1丁目公園">
                <div class="splide__track">
                    <ul class="splide__list">
                        <!-- 各スライドの画像 -->
                        <li class="splide__slide">
                            <img src="self/津田沼一丁目1.jpg" alt="">
                        </li>
                        <li class="splide__slide">
                            <img src="self/津田沼一丁目2.jpg" alt="">
                        </li>
                        <li class="splide__slide">
                            <img src="self/津田沼一丁目5.jpg" alt="">
                        </li>
                    </ul>
                </div>
            </section>
        </section>

        <!-- 公園の特徴セクション -->
        <section class="features">
            <h2>遊び場の特徴</h2>
            <ul>
                <li>1. 駅から徒歩3分！津田沼駅から</li>
                <li>2. 津田沼で唯一模型SL機関車の見れる公園！</li>
                <li>3. 遊具だけでなく砂場でも遊べる！</li>
            </ul>
        </section>

        <!-- 公園の基本情報セクション -->
        <section class="info">
            <h2>基本情報</h2>
            <p><strong>所在地:</strong> 千葉県習志野市津田沼1-4</p>
            <p><strong>開園日:</strong> 常時開園</p>
            <p><strong>入園料:</strong> 無料</p>
            <p><strong>駐車場:</strong> なし</p>
        </section>

        <!-- 交通案内セクション -->
        <section class="access">
            <h2>交通案内</h2>
            <p>JR総武線「津田沼」駅から、徒歩3分</p>
            <p>新京成線 新津田沼駅より徒歩1分</p>
        </section>
    </main>

    <!-- フッター部分 -->
    <footer>
        <p>&copy; 2024 OGASAWARA-A</p>
    </footer>

    <!-- SplideJSのJavaScriptファイルを読み込み、スライダーを初期化 -->
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@latest/dist/js/splide.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
          new Splide('#image-carousel', {
              type       : 'slide', // スライドタイプを設定（フェードやループなどのオプションもあり）
              perPage    : 1, // 1ページに表示するスライド数
              perMove    : 1, // 1回の移動で進むスライド数
              loop       : true, // スライドをループさせる
              rewind     : true, // 最後に達したら最初に戻る
              autoplay   : false, // 自動再生をオフにする
              pagination : false, // ページネーションを表示しない
              arrows     : true, // 次へ、前へボタンを表示
          }).mount(); // SplideJSを初期化してスライダーを動作させる
      });
    </script>
</body>
</html>
