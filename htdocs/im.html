<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水元公園 - Tokyo Metropolitan Park Association</title>
    <link rel="stylesheet" href="im.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="tokyo-park-logo.png" alt="Tokyo Park Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#">ホーム</a></li>
                <li><a href="#">公園情報</a></li>
                <li><a href="#">イベント</a></li>
                <li><a href="#">アクセス</a></li>
                <li><a href="#">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>水元公園</h1>
            <p>水面も空も芝生も広々と広がる自然豊かな公園</p>
            <img src="mizumoto-park.jpg" alt="水元公園の風景">
        </section>

        <section class="info">
            <h2>基本情報</h2>
            <p><strong>所在地:</strong> 東京都葛飾区水元公園・水元猿町・東金町五、八丁目・埼玉県三郷市</p>
            <p><strong>開園日:</strong> 常時開園</p>
            <p><strong>入園料:</strong> 無料（一部有料施設あり）</p>
        </section>

        <section class="access">
            <h2>交通案内</h2>
            <p>JR常磐線「金町」駅から京成バスで「水元公園」下車、徒歩5分</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Tokyo Metropolitan Park Association</p>
    </footer>

</html>
