<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おすすめの公園</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }
        .park {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .park img {
            width: 100%;
            border-radius: 8px;
        }
        .park h2 {
            color: #333;
        }
        .park p {
            color: #666;
        }
        .park a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .park a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<header>
    <h1>津田沼おすすめの公園</h1>
</header>

<div class="container">

    <div class="park">
        <h2>1.谷津奏の杜公園</h2>
        <img src="C:\Users\USER\Desktop\S__5373970.jpg" alt="谷津奏の杜の写真">
        <img src="C:\Users\USER\Desktop\S__5373976.jpg" alt="谷津奏の杜の写真">
        <p>津田沼で最も広大な公園です。遊具の数は少ないが、芝生のエリアではボールを使った遊びもできます。</p>
        <p>＜基本情報＞
        <br/>所在地：千葉県習志野市奏の杜2丁目
        <br/>料金：無料
        <br/>開園時間：２４時間
        <br/>定休日：なし
        <br/>駐車場：あり（9:00~17:00）
    </div>

    <div class="park">
        <h2>2.津田沼一丁目公園</h2>
        <img src="https://example.com/ueno.jpg" alt="津田沼一丁目の写真">
        <p>新津田沼駅近くにある広々とした開放的な公園です。遊具は滑り台やうんていがつながっているコンビネーション遊具があります。
        <br/>  さらにSL機関車も有名で列車好きのお子さんにもおすすめです。</p>
        <p>＜基本情報＞
        <br/>所在地：千葉県習志野市津田沼1-4
        <br/>料金：無料
        <br/>開園時間：２４時間
        <br/>定休日：なし
        <br/>駐車場：なし
    </div>

    
</div>

</body>
</html>
